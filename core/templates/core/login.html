{% load static %}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kivy Games | Entrar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">

    <style nonce="{{ request.csp_nonce }}">
        :root {
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-dark: #2c3e50;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            color: var(--text-dark);
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            padding: 2.5rem;
        }

        .login-card {
            max-width: 460px;
            margin: 0 auto;
        }

        .brand-mark {
            width: 64px;
            height: 64px;
            margin: 0 auto 12px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            background: linear-gradient(145deg, #34c8e8 0%, #2f80ed 100%);
            box-shadow: 0 10px 25px rgba(47, 128, 237, 0.35);
        }

        .btn-glossy {
            background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 100%);
            border: 1px solid white;
            color: #0d6efd;
            border-radius: 30px;
            padding: 10px 30px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(130, 224, 255, 0.4);
            backdrop-filter: blur(4px);
            transition: all 0.3s;
        }
        .btn-glossy:hover {
            background: white;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,255,255,0.8);
            color: #0b5ed7;
        }

        .form-control {
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.6);
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(4px);
            padding: 12px 16px;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.7);
            border-color: #0d6efd;
            box-shadow: 0 0 10px rgba(13, 110, 253, 0.2);
        }

        .background-blobs {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
        }
        .blob-1 { top: 10%; left: 10%; width: 300px; height: 300px; background: rgba(162, 217, 255, 0.4); }
        .blob-2 { top: 60%; right: 10%; width: 400px; height: 400px; background: rgba(200, 247, 197, 0.4); }
    </style>
</head>
<body>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="glass-panel login-card">
                    <div class="text-center mb-4">
                        <a href="{% url 'home' %}" class="text-decoration-none">
                            <div class="brand-mark" aria-hidden="true">K</div>
                            <h3 class="fw-bold text-primary">Kivy Games</h3>
                        </a>
                        <p class="text-muted">Entre na sua conta</p>
                    </div>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} bg-white bg-opacity-50 border-0 rounded-pill text-center">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="username" class="form-label fw-bold">Usuário</label>
                            <input type="text" class="form-control" id="username" name="username" placeholder="Seu nome de usuário" required>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label fw-bold">Senha</label>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Sua senha" required>
                        </div>
                        <button type="submit" class="btn btn-glossy w-100">Entrar</button>
                    </form>

                    <div class="text-center mt-4">
                        <a href="{% url 'home' %}" class="text-muted text-decoration-none">
                            &larr; Voltar para a página inicial
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        nonce="{{ request.csp_nonce }}">
    </script>
</body>
</html>
